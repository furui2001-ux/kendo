<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>剣道部 部員別アドバイス</title>
<style>
:root {
  --ink: #1c2329;
  --muted: #5c6873;
  --line: #d8dde2;
  --paper: #ffffff;
  --base: #f3f5f7;
  --red: #a41521;
  --nav: #161b20;
  --soft: #fbfcfd;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "Yu Gothic", "Meiryo", system-ui, sans-serif;
  color: var(--ink);
  background: var(--base);
  line-height: 1.75;
}
header {
  background: var(--nav);
  color: white;
  padding: 20px clamp(16px, 4vw, 32px) 16px;
}
h1 {
  margin: 0;
  font-size: clamp(21px, 4.5vw, 30px);
  line-height: 1.35;
  letter-spacing: 0;
}
.tabs {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 10px clamp(12px, 4vw, 32px);
  background: var(--paper);
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  z-index: 2;
  -webkit-overflow-scrolling: touch;
}
.tabs button {
  flex: 0 0 auto;
  min-width: 76px;
  min-height: 42px;
  border: 1px solid #b8c1ca;
  background: #fff;
  color: var(--ink);
  border-radius: 6px;
  padding: 8px 14px;
  font: inherit;
  font-weight: 700;
  cursor: pointer;
}
.tabs button.active {
  background: var(--red);
  color: white;
  border-color: var(--red);
}
main {
  max-width: 1180px;
  margin: 0 auto;
  padding: clamp(14px, 4vw, 24px) clamp(12px, 4vw, 20px) 56px;
}
.member {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: clamp(16px, 4vw, 24px);
}
.memberHeader {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 16px;
  border-bottom: 3px solid var(--red);
}
.eyebrow {
  margin: 0 0 8px;
  color: var(--muted);
  font-weight: 700;
}
h2 {
  margin: 0 0 6px;
  font-size: clamp(30px, 10vw, 44px);
  line-height: 1.1;
  letter-spacing: 0;
}
.sceneTime {
  margin: 0 0 8px;
  color: var(--muted);
  font-size: 14px;
  font-weight: 700;
  text-align: right;
}
.advice {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
  margin-bottom: 18px;
}
.advice article,
.scores,
.training {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 13px 14px;
  background: var(--soft);
}
h3 {
  margin: 0 0 6px;
  font-size: 17px;
  line-height: 1.35;
}
p { margin: 0; }
.scores {
  display: grid;
  grid-template-columns: repeat(6, minmax(0, 1fr));
  gap: 8px;
  margin-bottom: 18px;
}
.scoreItem {
  min-width: 0;
  padding: 8px;
  border-radius: 6px;
  background: #fff;
  border: 1px solid #e4e8ec;
}
.scoreLabel {
  display: block;
  color: var(--muted);
  font-size: 13px;
  font-weight: 700;
}
.stars {
  color: var(--red);
  font-size: 18px;
  line-height: 1.3;
  letter-spacing: 0;
  white-space: nowrap;
}
.clips {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
  margin-bottom: 18px;
}
figure { margin: 0; }
video {
  width: 100%;
  aspect-ratio: 16 / 9;
  display: block;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: #111;
}
figcaption {
  color: var(--muted);
  font-size: 14px;
  margin-top: 6px;
  font-weight: 700;
}
.training ul {
  margin: 6px 0 0;
  padding-left: 1.2em;
}
.loading,
.error {
  color: var(--muted);
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 16px;
}
@media (max-width: 920px) {
  .scores {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
}
@media (max-width: 820px) {
  .advice,
  .clips {
    grid-template-columns: 1fr;
  }
  .memberHeader {
    display: block;
  }
  .sceneTime {
    text-align: left;
  }
  .tabs button {
    min-width: 70px;
    min-height: 40px;
    padding: 7px 12px;
  }
}
@media (max-width: 520px) {
  .scores {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}
</style>
</head>
<body>
<header><h1>剣道部 部員別アドバイス</h1></header>
<nav class="tabs" aria-label="部員選択" id="tabs"></nav>
<main id="app"><p class="loading">読み込み中です。</p></main>
<script>
const dataUrl = "data/members.json";
const tabs = document.getElementById("tabs");
const app = document.getElementById("app");
let members = [];

function escapeHtml(value) {
  return String(value ?? "").replace(/[&<>"']/g, (char) => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#39;"
  }[char]));
}

function stars(value) {
  const score = Math.max(1, Math.min(5, Number(value) || 1));
  return "★".repeat(score) + "☆".repeat(5 - score);
}

function sceneRange(member, kind) {
  const start = member[`${kind}SceneStart`];
  const end = member[`${kind}SceneEnd`];
  if (typeof start !== "number" || typeof end !== "number") return "";
  return `${start.toFixed(1)}秒 - ${end.toFixed(1)}秒`;
}

function clipType(src) {
  return src.toLowerCase().endsWith(".mov") ? "video/quicktime" : "video/mp4";
}

function clipRange(clip) {
  if (typeof clip.start !== "number" || typeof clip.end !== "number") return "";
  return `${clip.start.toFixed(1)}秒 - ${clip.end.toFixed(1)}秒`;
}

function clipSrc(clip) {
  const range = clipRange(clip);
  return range ? `${clip.video}#t=${clip.start},${clip.end}` : clip.video;
}

function memberClips(member, kind) {
  const clips = member[`${kind}Clips`];
  if (Array.isArray(clips) && clips.length) return clips;
  const src = member[`${kind}Video`];
  if (!src) return [];
  return [{
    video: src,
    start: member[`${kind}SceneStart`],
    end: member[`${kind}SceneEnd`]
  }];
}

function videoFigure(clip, label, index) {
  const range = clipRange(clip);
  const caption = index > 1 ? `${label} ${index}` : label;
  return `
    <figure>
      <video controls loop muted playsinline preload="metadata">
        <source src="${escapeHtml(clipSrc(clip))}" type="${escapeHtml(clipType(clip.video))}">
        お使いのブラウザでは動画を再生できません。
      </video>
      <figcaption>${escapeHtml(caption)}${range ? ` <span>(${escapeHtml(range)})</span>` : ""}${clip.note ? ` - ${escapeHtml(clip.note)}` : ""}</figcaption>
    </figure>
  `;
}

function renderTabs(activeName) {
  tabs.innerHTML = members.map((member) => `
    <button type="button" data-target="${escapeHtml(member.name)}" class="${member.name === activeName ? "active" : ""}" aria-pressed="${member.name === activeName}">
      ${escapeHtml(member.name)}
    </button>
  `).join("");
  [...tabs.querySelectorAll("button")].forEach((button) => {
    button.addEventListener("click", () => show(button.dataset.target));
  });
}

function renderMember(member) {
  const scores = Object.entries(member.scores || {}).map(([label, value]) => `
    <div class="scoreItem">
      <span class="scoreLabel">${escapeHtml(label)}</span>
      <span class="stars" aria-label="${escapeHtml(label)} ${Number(value) || 1}点">${stars(value)}</span>
    </div>
  `).join("");
  const training = (member.training || []).map((item) => `<li>${escapeHtml(item)}</li>`).join("");
  const comparison = member.comparison ? `
        <article>
          <h3>前回（6/13）との比較</h3>
          <p>${escapeHtml(member.comparison)}</p>
        </article>
  ` : "";
  const ipponAnalysis = member.ipponAnalysis ? `
        <article>
          <h3>打突分析</h3>
          <p>${escapeHtml(member.ipponAnalysis)}</p>
        </article>
  ` : "";
  const goodClips = memberClips(member, "good").map((clip, index) => videoFigure(clip, "良い点を見る場面", index + 1)).join("");
  const improveClips = memberClips(member, "improve").map((clip, index) => videoFigure(clip, "改善点を見る場面", index + 1)).join("");
  app.innerHTML = `
    <section class="member" id="${escapeHtml(member.name)}">
      <div class="memberHeader">
        <div>
          <p class="eyebrow">${escapeHtml(member.tasuki)}・${escapeHtml(member.name)}</p>
          <h2>${escapeHtml(member.name)}</h2>
        </div>
        <p class="sceneTime">${escapeHtml(member.matchDate || "")}</p>
      </div>
      <div class="advice" aria-label="${escapeHtml(member.name)}の助言">
        <article>
          <h3>最優先テーマ</h3>
          <p>${escapeHtml(member.priority)}</p>
        </article>
        <article>
          <h3>良い点</h3>
          <p>${escapeHtml(member.good)}</p>
        </article>
        <article>
          <h3>改善点</h3>
          <p>${escapeHtml(member.improve)}</p>
        </article>
        ${comparison}
        ${ipponAnalysis}
      </div>
      <div class="scores" aria-label="${escapeHtml(member.name)}の評価">${scores}</div>
      <div class="clips" aria-label="${escapeHtml(member.name)}の確認動画">
        ${goodClips}
        ${improveClips}
      </div>
      <section class="training" aria-label="${escapeHtml(member.name)}の練習メニュー">
        <h3>次の練習メニュー</h3>
        <ul>${training}</ul>
      </section>
    </section>
  `;
}

function show(name) {
  const member = members.find((item) => item.name === name) || members[0];
  if (!member) return;
  renderTabs(member.name);
  renderMember(member);
  history.replaceState(null, "", "#" + encodeURIComponent(member.name));
}

async function init() {
  try {
    const response = await fetch(dataUrl, { cache: "no-store" });
    if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
    members = await response.json();
    const initial = decodeURIComponent(location.hash.replace(/^#/, "")) || members[0]?.name;
    show(members.some((member) => member.name === initial) ? initial : members[0]?.name);
  } catch (error) {
    app.innerHTML = `<p class="error">data/members.json を読み込めませんでした。GitHub PagesなどのWebサーバー上で開いてください。</p>`;
  }
}

init();
</script>
</body>
</html>
